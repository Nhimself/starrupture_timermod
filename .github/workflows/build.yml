name: Build TimerMod

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Client Release
        run: |
          msbuild "StarRupture-TimerMod.sln" `
            /p:Configuration="Client Release" `
            /p:Platform=x64 `
            /m `
            /v:minimal

      - name: Upload Client DLL
        uses: actions/upload-artifact@v4
        with:
          name: TimerMod-Client
          path: bin/x64/Client Release/plugins/TimerMod.dll
