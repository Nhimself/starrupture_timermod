name: Check for SDK update

# Fires in three ways:
#   1. Weekly poll — checks whether a new SDK release is available
#   2. Manual run  — workflow_dispatch for on-demand checks
#   3. External    — repository_dispatch with event_type "sdk-released"
#                    (the SDK repo can POST to this repo's dispatches endpoint
#                     from its own release workflow using a PAT/fine-grained
#                     token that has repo access here)
#
# When a new SDK release is found, a PR is opened against main.
# You decide when to merge — once merged, push a v* tag to trigger a release build.
on:
  schedule:
    - cron: '0 6 * * 1'    # 06:00 UTC every Monday
  workflow_dispatch:
  repository_dispatch:
    types: [sdk-released]

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new SDK release and open PR
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Determine the tag to target:
          # - repository_dispatch may supply it in client_payload.tag
          # - otherwise query the latest release from the SDK repo
          DISPATCH_TAG="${{ github.event.client_payload.tag }}"
          if [ -n "$DISPATCH_TAG" ]; then
            LATEST_TAG="$DISPATCH_TAG"
            echo "Using tag from dispatch payload: $LATEST_TAG"
          else
            LATEST_TAG=$(gh api repos/AlienXAXS/StarRupture-Game-SDK/releases/latest \
              --jq '.tag_name' 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "No releases found in SDK repo — nothing to do."
              echo "updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Latest SDK release: $LATEST_TAG"
          fi

          # Resolve the commit SHA the release tag points to
          RELEASE_SHA=$(gh api "repos/AlienXAXS/StarRupture-Game-SDK/commits/$LATEST_TAG" \
            --jq '.sha' 2>/dev/null || echo "")

          CURRENT_SHA=$(git -C "StarRupture SDK" rev-parse HEAD)
          echo "Current submodule SHA : $CURRENT_SHA"
          echo "Latest release SHA    : ${RELEASE_SHA:-<could not resolve>}"

          if [ -z "$RELEASE_SHA" ]; then
            echo "Could not resolve commit for tag $LATEST_TAG — skipping."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT_SHA" = "$RELEASE_SHA" ]; then
            echo "SDK submodule is already at $LATEST_TAG — nothing to do."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if a PR already exists for this SDK version
          PR_BRANCH="sdk-update/$LATEST_TAG"
          EXISTING_PR=$(gh pr list --head "$PR_BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for $LATEST_TAG — skipping."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create branch, update submodule, push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$PR_BRANCH"
          git -C "StarRupture SDK" fetch --tags origin
          git -C "StarRupture SDK" checkout "$LATEST_TAG"
          git add "StarRupture SDK"
          git commit -m "chore: update StarRupture SDK to $LATEST_TAG"
          git push origin "$PR_BRANCH"

          # Open PR — you merge when ready, then push a tag to release
          gh pr create \
            --title "chore: update StarRupture SDK to $LATEST_TAG" \
            --body "Updates the StarRupture SDK submodule to [$LATEST_TAG](https://github.com/AlienXAXS/StarRupture-Game-SDK/releases/tag/$LATEST_TAG).

          Test with the updated SDK locally using \`build.sh\` before merging.
          Once merged, push a \`v*\` tag to trigger a release build." \
            --base main \
            --head "$PR_BRANCH"

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "sdk_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.update.outputs.updated }}" = "true" ]; then
            echo "### PR opened for SDK ${{ steps.update.outputs.sdk_tag }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Review, test locally, merge when ready — then push a tag to release." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No SDK update needed" >> "$GITHUB_STEP_SUMMARY"
            echo "SDK submodule is already at the latest release." >> "$GITHUB_STEP_SUMMARY"
          fi
